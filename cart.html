<!DOCTYPE html>
<html>
<head>
<title>Cart</title>


<style>
body{
   margin:0;
   font-family:Arial;
   background:#f4f6f8;
}


/* TOP BAR */
.topbar{
   background:#0b6b3a;
   color:white;
   padding:15px;
}


.logo{
   font-size:24px;
   font-weight:bold;
}


/* NAV */
nav{
   background:#f5f5f5;
   padding:12px;
}


nav a{
   margin-right:15px;
   text-decoration:none;
   color:black;
   font-weight:bold;
}


/* LAYOUT */
.container{
   display:flex;
   gap:20px;
   padding:20px;
   max-width:1000px;
   margin:auto;
}


.items{
   flex:2;
   background:white;
   padding:15px;
   border-radius:10px;
}


.summary{
   flex:1;
   background:white;
   padding:15px;
   border-radius:10px;
   height:fit-content;
}


button{
   padding:10px;
   border:none;
   cursor:pointer;
   font-weight:bold;
   margin-top:10px;
}


.checkout{
   width:100%;
   background:#0b6b3a;
   color:white;
}


.clear{
   width:100%;
   background:#ddd;
}
</style>


</head>


<body>


<div class="topbar">
   <div class="logo">Your Cart</div>
</div>


<nav>
   <a href="index.html">Home</a>
   <a href="deals.html">Deals</a>
   <a href="snacks.html">Snacks</a>
   <a href="order.html">Order</a>
   <a href="cart.html">Cart</a>
</nav>


<div class="container">


   <div class="items">
       <h2>Items in Cart</h2>
       <div id="cartItems"></div>
   </div>


   <div class="summary">
       <h2>Summary</h2>


       <p>Total:</p>
       <h2 id="total">$0.00</h2>


       <button class="checkout" onclick="window.location.href='order.html'">Order</button>
       <button class="clear" onclick="clearCart()">Clear Cart</button>
   </div>


</div>


<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];


// SAVE
function save(){
   localStorage.setItem("cart", JSON.stringify(cart));
}


// REMOVE ITEM
function removeItem(i){
   cart.splice(i, 1);
   save();
   renderCart();
}


// TOTAL
function getTotal(){
   return cart.reduce((sum, item) => sum + (Number(item.price) || 0), 0);
}


// RENDER CART
function renderCart(){
   const box = document.getElementById("cartItems");
   const totalBox = document.getElementById("total");


   box.innerHTML = "";


   if(cart.length === 0){
       box.innerHTML = "<p>Your cart is empty.</p>";
   } else {
       cart.forEach((item, i) => {
           box.innerHTML += `
           <div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #ddd">
               <div>
                   <b>${item.name}</b><br>
                   $${Number(item.price).toFixed(2)}
               </div>
               <button onclick="removeItem(${i})">Remove</button>
           </div>
           `;
       });
   }


   totalBox.innerText = "$" + getTotal().toFixed(2);
}


// CLEAR CART
function clearCart(){
   cart = [];
   save();
   renderCart();
}


// LOAD
window.onload = renderCart;
</script>


</body>
</html>
